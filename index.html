<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>FlexMind Cards</title>
  <p>ไม่มีคำตอบที่ผิด ทุกความรู้สึกมีความหมาย</p>
  <p>เลือกไพ่ 5 ใบ → เลือก 1 ใบที่กระทบใจที่สุด → สะท้อนตัวเอง</p>
  
<style>
body { font-family:sans-serif; background:#f7f5f2; text-align:center; }
.cards { display:flex; flex-wrap:wrap; justify-content:center; }
.card { width:100px; height:140px; margin:6px; cursor:pointer; }
.card img { width:100%; height:100%; object-fit:cover; }
.selected { border:3px solid green; }
button { margin-top:20px; padding:10px 20px; }
</style>
</head>

<body>

<h1>FlexMind Cards</h1>

<h2>Acceptance (เลือก 5 ใบ)</h2>
<div id="acceptance" class="cards"></div>

<h2>Commitment (เลือก 5 ใบ)</h2>
<div id="commitment" class="cards"></div>

<button id="next" style="display:none;" onclick="goNext()">ถัดไป</button>

<div id="form" style="display:none;">
<h2>สะท้อนตัวเอง</h2>
<input id="name" placeholder="ชื่อ"><br>
<textarea id="q1" placeholder="คุณเห็นอะไร"></textarea><br>
<button onclick="send()">ส่ง</button>
</div>

<script>

// ✅ ใช้ URL เต็มเท่านั้น

["https://i.postimg.cc/sxHhP4cS/59.jpg","https://i.postimg.cc/RhpH1LRw/60.jpg"]
];

let selA=[], selC=[];

function render(id,data,store){
  const el=document.getElementById(id);
  el.innerHTML="";

  data.forEach(pair=>{
    const div=document.createElement("div");
    div.className="card";

    const img=document.createElement("img");
    img.src=pair[0];

    let open=false;

    div.onclick=()=>{
      if(open || store.length>=5) return;

      img.src=pair[1];
      open=true;
      store.push(pair[1]);
      div.classList.add("selected");

      if(selA.length===5 && selC.length===5){
        document.getElementById("next").style.display="block";
      }
    };

    div.appendChild(img);
    el.appendChild(div);
  });
}

function goNext(){
  document.getElementById("form").style.display="block";
}

function send(){
  fetch(URL,{
    method:"POST",
    mode:"no-cors",
    body:JSON.stringify({
      name:document.getElementById("name").value,
      q1:document.getElementById("q1").value,
      A:selA,
      C:selC
    })
  });

  alert("ส่งแล้ว");
}

// start
render("acceptance",A,selA);
render("commitment",C,selC);

</script>

</body>
</html>
