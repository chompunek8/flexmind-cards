<style>

  <h2>Commitment (เลือก 5 ใบ)</h2>

</div>

  <textarea id="q1" placeholder="การ์ดใบนี้สะท้อนอะไรในตัวคุณ"></textarea>
  <textarea id="q2" placeholder="คุณจะนำไปใช้ในชีวิตจริงอย่างไร"></textarea>

</div>

<div id="thankyou" style="display:none;">

  <p>คุณได้ก้าวหนึ่งในการเข้าใจตัวเอง</p>
</div>

</div>

let selectedA = [];
let selectedC = [];
let finalCard = "";

// ===== NAV =====
function startGame(){
  document.getElementById("welcome").style.display="none";
  document.getElementById("game").style.display="block";
}

// ===== RENDER =====
function renderCards(id, pairs, type){
  const el = document.getElementById(id);

  pairs.forEach(pair=>{
    const div=document.createElement("div");
    div.className="card";

    const img=document.createElement("img");
    img.src=pair[0];

    let opened=false;

    div.onclick=()=>{
      if(opened) return;

      if(type==="A" && selectedA.length>=5) return alert("ครบ 5 ใบ");
      if(type==="C" && selectedC.length>=5) return alert("ครบ 5 ใบ");

      img.src=pair[1];
      opened=true;

      if(type==="A") selectedA.push(pair[1]);
      else selectedC.push(pair[1]);

      div.classList.add("selected");

      if(selectedA.length===5 && selectedC.length===5){
        document.getElementById("goSelect").style.display="block";
      }
    };

    div.appendChild(img);
    el.appendChild(div);
  });
}

renderCards("acceptance",acceptancePairs,"A");
renderCards("commitment",commitmentPairs,"C");

// ===== SELECT 1 =====
function goSelect(){
  document.getElementById("game").style.display="none";
  document.getElementById("selectOne").style.display="block";

  const all=[...selectedA,...selectedC];
  const el=document.getElementById("selectedCards");

  all.forEach(src=>{
    const img=document.createElement("img");
    img.src=src;
    img.className="card";

    img.onclick=()=>{
      finalCard=src;
      document.getElementById("selectOne").style.display="none";
      document.getElementById("interview").style.display="block";
    };

    el.appendChild(img);
  });
}

// ===== SUBMIT =====
function submitData(){
  fetch("https://script.google.com/macros/s/AKfycbxcimSrghE_dF3aKh3eA_c-Fv1_Fk81fCeiHotkVLtGrmZapQq4tXF0U4iAxuEIgAQ1qA/exec",{
    method:"POST",
    body:JSON.stringify({
      name:document.getElementById("name").value,
      q1:document.getElementById("q1").value,
      q2:document.getElementById("q2").value,
      finalCard,
      acceptance:selectedA,
      commitment:selectedC
    })
  }).then(()=>{
    document.getElementById("interview").style.display="none";
    document.getElementById("thankyou").style.display="block";
  });
}
