<style>
body {
  font-family: "Prompt", sans-serif;
  background: #f7f5f2;
  margin: 0;
  padding: 20px;
  text-align: center;
  color: #333;
}

/* container */
#app {
  max-width: 900px;
  margin: auto;
}

/* headings */
h1 {
  font-size: 28px;
  margin-bottom: 10px;
}

h2 {
  margin-top: 30px;
  color: #555;
}

/* text */
p {
  color: #777;
  line-height: 1.6;
}

/* card layout */
#acceptance, #commitment, #selectedCards {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
}

/* card */
.card {
  width: 100px;
  height: 140px;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.25s ease;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.card:hover {
  transform: translateY(-5px);
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* selected */
.card.selected {
  transform: scale(1.1);
  box-shadow: 0 6px 16px rgba(0,0,0,0.2);
  border: 3px solid #6c9a8b;
}

/* button */
button {
  background: #6c9a8b;
  color: white;
  border: none;
  padding: 12px 20px;
  border-radius: 20px;
  font-size: 16px;
  margin-top: 20px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #5a8578;
}

/* input */
input, textarea {
  width: 80%;
  max-width: 400px;
  padding: 10px;
  margin: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-family: inherit;
}

textarea {
  height: 80px;
}

/* section card */
#welcome, #interview, #thankyou {
  background: white;
  padding: 25px;
  border-radius: 16px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.05);
}
</style>

<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>FlexMind Cards</title>

<style>
body {
  font-family: sans-serif;
  background: #f7f5f2;
  text-align: center;
  padding: 20px;
}

#app { max-width: 900px; margin: auto; }

.cards {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  width: 265px;
  height: 454px;
  margin: 6px;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
  transition: .2s;
}

.card:hover { transform: translateY(-5px); }

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.selected {
  border: 3px solid #6c9a8b;
  transform: scale(1.05);
}

button {
  padding: 10px 20px;
  border-radius: 20px;
  border: none;
  background: #6c9a8b;
  color: white;
  cursor: pointer;
  margin-top: 20px;
}

input, textarea {
  width: 80%;
  margin: 10px;
  padding: 10px;
}
</style>

</head>
<body>

<div id="app">

<!-- WELCOME -->
<div id="welcome">
  <h1>FlexMind Cards</h1>
  <p>ไม่มีคำตอบที่ผิด ทุกความรู้สึกมีความหมาย</p>
  <p>เลือกไพ่หมวดละ 5 ใบ → เลือก 1 ใบที่กระทบใจที่สุด → สะท้อนตัวเอง</p>
  <button onclick="startGame()">เริ่มเล่น</button>
</div>

<!-- GAME -->
<div id="game" style="display:none;">
  <h2>Acceptance (เลือก 5 ใบ)</h2>
  <div id="acceptance" class="cards"></div>

  <h2>Commitment (เลือก 5 ใบ)</h2>
  <div id="commitment" class="cards"></div>

  <button id="nextBtn" style="display:none;" onclick="goSelect()">ถัดไป</button>
</div>

<!-- SELECT -->
<div id="select" style="display:none;">
  <h2>เลือก 1 ใบที่กระทบใจที่สุด</h2>
  <div id="selectedCards" class="cards"></div>
</div>

<!-- INTERVIEW -->
<div id="interview" style="display:none;">
  <h2>สะท้อนตัวเอง</h2>
  <input id="name" placeholder="ชื่อ"><br>
  <textarea id="q1" placeholder="คุณสังเกตอะไร"></textarea><br>
  <textarea id="q2" placeholder="คุณจะทำอะไรต่อ"></textarea><br>
  <button onclick="submitData()">ส่งข้อมูล</button>
</div>

<!-- THANK -->
<div id="thank" style="display:none;">
  <h2>ขอบคุณ</h2>
</div>

</div>

<script>

// 🔴 ใส่ URL Script ของคุณตรงนี้
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwXCTUAngWZLw42hvdvLjjGniU0hWAX5tLajRReCfZ2E-zWljQ7DcmyQ6o_f_sc238z_Q/exec";

// ===== DATA =====
const A = [
["01.jpg","02.jpg"],["03.jpg","04.jpg"],["05.jpg","06.jpg"],
["07.jpg","08.jpg"],["09.jpg","10.jpg"],["11.jpg","12.jpg"],
["13.jpg","14.jpg"],["15.jpg","16.jpg"],["17.jpg","18.jpg"],
["19.jpg","20.jpg"],["21.jpg","22.jpg"],["23.jpg","24.jpg"],
["25.jpg","26.jpg"],["27.jpg","28.jpg"],["29.jpg","30.jpg"]
];

const C = [
["31.jpg","32.jpg"],["33.jpg","34.jpg"],["35.jpg","36.jpg"],
["37.jpg","38.jpg"],["39.jpg","40.jpg"],["41.jpg","42.jpg"],
["43.jpg","44.jpg"],["45.jpg","46.jpg"],["47.jpg","48.jpg"],
["49.jpg","50.jpg"],["51.jpg","52.jpg"],["53.jpg","54.jpg"],
["55.jpg","56.jpg"],["57.jpg","58.jpg"],["59.jpg","60.jpg"]
];

const base = "https://i.postimg.cc/";

let selA=[], selC=[], final="";

// ===== START =====
function startGame(){
  document.getElementById("welcome").style.display="none";
  document.getElementById("game").style.display="block";

  render("acceptance",A,selA);
  render("commitment",C,selC);
}

// ===== RENDER =====
function render(id,data,store){
  const el=document.getElementById(id);
  el.innerHTML="";

  data.forEach(pair=>{
    const div=document.createElement("div");
    div.className="card";

    const img=document.createElement("img");
    img.src=base+pair[0];

    let open=false;

    div.onclick=()=>{
      if(open || store.length>=5) return;

      img.src=base+pair[1];
      open=true;
      store.push(base+pair[1]);
      div.classList.add("selected");

      if(selA.length===5 && selC.length===5){
        document.getElementById("nextBtn").style.display="block";
      }
    };

    div.appendChild(img);
    el.appendChild(div);
  });
}

// ===== SELECT =====
function goSelect(){
  document.getElementById("game").style.display="none";
  document.getElementById("select").style.display="block";

  const el=document.getElementById("selectedCards");
  el.innerHTML="";

  [...selA,...selC].forEach(src=>{
    const img=document.createElement("img");
    img.src=src;
    img.className="card";

    img.onclick=()=>{
      final=src;
      document.getElementById("select").style.display="none";
      document.getElementById("interview").style.display="block";
    };

    el.appendChild(img);
  });
}

// ===== SUBMIT =====
function submitData(){

  const data={
    name:document.getElementById("name").value,
    q1:document.getElementById("q1").value,
    q2:document.getElementById("q2").value,
    final,
    A:selA,
    C:selC
  };

  fetch(SCRIPT_URL,{
    method:"POST",
    mode:"no-cors",
    body:JSON.stringify(data)
  });

  document.getElementById("interview").style.display="none";
  document.getElementById("thank").style.display="block";
}

</script>

</body>
</html>
