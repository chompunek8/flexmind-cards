<style>
body {
  font-family: "Prompt", sans-serif;
  background: #f7f5f2;
  margin: 0;
  padding: 20px;
  text-align: center;
  color: #333;
}

/* container */
#app {
  max-width: 900px;
  margin: auto;
}

/* headings */
h1 {
  font-size: 28px;
  margin-bottom: 10px;
}

h2 {
  margin-top: 30px;
  color: #555;
}

/* text */
p {
  color: #777;
  line-height: 1.6;
}

/* card layout */
#acceptance, #commitment, #selectedCards {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
}

/* card */
.card {
  width: 100px;
  height: 140px;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.25s ease;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.card:hover {
  transform: translateY(-5px);
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* selected */
.card.selected {
  transform: scale(1.1);
  box-shadow: 0 6px 16px rgba(0,0,0,0.2);
  border: 3px solid #6c9a8b;
}

/* button */
button {
  background: #6c9a8b;
  color: white;
  border: none;
  padding: 12px 20px;
  border-radius: 20px;
  font-size: 16px;
  margin-top: 20px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #5a8578;
}

/* input */
input, textarea {
  width: 80%;
  max-width: 400px;
  padding: 10px;
  margin: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-family: inherit;
}

textarea {
  height: 80px;
}

/* section card */
#welcome, #interview, #thankyou {
  background: white;
  padding: 25px;
  border-radius: 16px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.05);
}
</style>
